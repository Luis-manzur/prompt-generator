{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Prompt Improver{% endblock %}</title>
  <script src="{% static 'web/htmx.min.js' %}" defer></script>
  <style>
    :root { --bg:#0f1115; --panel:#171a21; --border:#262b36; --fg:#e6e9ef;
            --muted:#8b94a7; --accent:#5b8cff; --good:#3fb950; --bad:#f85149; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
           font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    header { display:flex; gap:1.5rem; align-items:center;
             padding:1rem 1.5rem; border-bottom:1px solid var(--border); }
    header h1 { font-size:1rem; margin:0; }
    header a { color:var(--muted); text-decoration:none; }
    header a:hover { color:var(--fg); }
    main { max-width:820px; margin:0 auto; padding:1.5rem; }
    h2 { font-size:1.1rem; margin:0 0 .75rem; }
    label { display:block; font-size:.85rem; color:var(--muted); margin:.75rem 0 .25rem; }
    textarea, input, select {
      width:100%; background:var(--panel); color:var(--fg);
      border:1px solid var(--border); border-radius:6px; padding:.6rem; font:inherit; }
    textarea { min-height:140px; resize:vertical; }
    button { background:var(--accent); color:#fff; border:0; border-radius:6px;
             padding:.55rem 1rem; font:inherit; cursor:pointer; margin-top:.75rem; }
    button.ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
    button:hover { filter:brightness(1.1); }
    .panel { background:var(--panel); border:1px solid var(--border);
             border-radius:8px; padding:1rem; margin-top:1rem; }
    .row { display:flex; justify-content:space-between; align-items:center; gap:1rem; }
    .muted { color:var(--muted); font-size:.85rem; }
    pre { white-space:pre-wrap; word-break:break-word; margin:0; }
    .delta-good { color:var(--good); } .delta-bad { color:var(--bad); }
    .err { color:var(--bad); }
    ul { list-style:none; padding:0; margin:0; }
    li { padding:.5rem 0; border-bottom:1px solid var(--border); }
    li:last-child { border-bottom:0; }
    .htmx-indicator { opacity:0; transition:opacity .2s; }
    .htmx-request .htmx-indicator { opacity:1; }
  </style>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  <header>
    <h1>Prompt Improver</h1>
    <a href="{% url 'web-improve-page' %}">Improve</a>
    <a href="{% url 'web-projects' %}">Projects</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
