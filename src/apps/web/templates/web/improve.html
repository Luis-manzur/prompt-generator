{% extends 'web/base.html' %}
{% block content %}
<h2>Improve a prompt</h2>
<form hx-post="{% url 'web-improve' %}" hx-target="#result" hx-swap="innerHTML">
  {% csrf_token %}
  <label for="prompt">Prompt</label>
  <textarea id="prompt" name="prompt" placeholder="Paste your raw prompt…"></textarea>

  <label for="project_id">Project context (optional)</label>
  <select id="project_id" name="project_id">
    <option value="">— none —</option>
    {% for p in projects %}
      <option value="{{ p.id }}">{{ p.name }}</option>
    {% endfor %}
  </select>

  <button type="submit">Improve</button>
  <span class="htmx-indicator muted">&nbsp;improving…</span>
</form>

<div id="result"></div>
{% endblock %}
